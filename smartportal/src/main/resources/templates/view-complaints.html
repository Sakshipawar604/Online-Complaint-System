<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Complaints</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
        text-align: center;
    }

    table {
        margin: auto;
        border-collapse: collapse;
        width: 80%;
        background: white;
    }

    th {
        background-color: #2c3e50;
        color: white;
        padding: 10px;
    }

    td {
        padding: 10px;
    }

    tr:nth-child(even) {
        background-color: #f2f2f2;
    }

    a {
        text-decoration: none;
        padding: 6px 12px;
        background-color: #3498db;
        color: white;
        border-radius: 4px;
        margin: 3px;
        display: inline-block;
    }

    a:hover {
        opacity: 0.9;
    }

    .pending-btn {
        background-color: #f39c12;
    }

    .resolved-btn {
        background-color: #27ae60;
    }

</style>

</head>
<body>

<h2>All Complaints</h2>

<!-- 🔥 FILTER BUTTONS ADDED -->
<div style="margin-bottom: 20px;">
    <a href="/admin/complaints">Show All</a>
    <a href="/admin/pending" class="pending-btn">Show Pending</a>
    <a href="/admin/resolved" class="resolved-btn">Show Resolved</a>
</div>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Status</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    <tr th:each="c : ${complaints}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.title}"></td>
        <td th:text="${c.description}"></td>
        <td th:text="${c.status}"></td>
        <td th:text="${c.date}"></td>

        <td>

            <!-- Resolve Button -->
            <a th:if="${c.status == 'Pending'}"
               th:href="@{/admin/resolve/{id}(id=${c.id})}">
               Mark as Resolved
            </a>

            <!-- If already resolved -->
            <span th:if="${c.status == 'Resolved'}">
               ✔ Resolved
            </span>

            |

            <!-- Delete Button -->
            <a th:href="@{/admin/delete/{id}(id=${c.id})}"
               onclick="return confirm('Are you sure you want to delete this complaint?')">
               Delete
            </a>

        </td>
    </tr>

</table>

</body>
</html>
